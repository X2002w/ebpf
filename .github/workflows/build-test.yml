name: Project Build Test

on:
  push:
    branches: 
      - master
    paths:
      - src/**
      - include/**
      - Makefile
  workflow_dispatch:
  pull_request:
    branches: 
      - master

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/x2002w/eebpf-build:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      volumes:
        - /sys/kernel/btf:/sys/kernel/btf:ro

    steps:
      - uses: actions/checkout@v4

      - name: Cache LLVM 19
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: /tmp/llvm
          key: llvm-19-1-7

      - name: Install LLVM 19
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.7/clang+llvm-19.1.7-x86_64-linux-gnu-ubuntu-22.04.tar.xz
          mkdir -p /tmp/llvm
          tar xf clang+llvm-19.1.7-x86_64-linux-gnu-ubuntu-22.04.tar.xz -C /tmp/llvm --strip-components=1
          rm clang+llvm-19.1.7-x86_64-linux-gnu-ubuntu-22.04.tar.xz

      - name: Build
        env:
          CLANG: /tmp/llvm/bin/clang
        run: make -j$(nproc)

      - name: 验证二进制
        run: test -x ./eebpf
