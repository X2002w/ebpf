name: ARM64 Build Test

on:
  push:
    branches:
      - master
    paths:
      - src/**
      - include/**
      - Makefile
  workflow_dispatch:
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ARM64 多平台适配验证: 原生构建 + 冒烟测试
  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm make libelf-dev libbpf-dev zlib1g-dev

      # 各发行版 bpftool 打包方式不一，从源码构建保证可用且行为一致
      - name: 源码构建 bpftool
        run: |
          git clone --depth 1 --recurse-submodules --shallow-submodules \
            https://github.com/libbpf/bpftool.git /tmp/bpftool
          make -C /tmp/bpftool/src -j$(nproc)
          sudo make -C /tmp/bpftool/src install
          sudo bpftool version

      - name: Build
        run: make -j$(nproc)

      - name: 验证二进制
        run: |
          test -x ./eebpf
          ./eebpf --version

      - name: 冒烟测试
        run: |
          sudo ./eebpf hot -i 2 -d 4
          sudo ./eebpf cpu -i 2 -d 4 -p 0
          sudo ./eebpf mem -i 2 -d 4
          sudo ./eebpf io -i 2 -d 4
          sudo ./eebpf lock -i 2 -d 4 -p 0
