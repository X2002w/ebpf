# eebpf 运行时配置文件
# 查找路径: /etc/eebpf.conf > ~/.eebpf.conf > ./eebpf.conf
# 后者覆盖前者; 仅需写入要覆盖的项，未写入的项使用默认值

# 全局: 默认采样间隔(秒)
interval = 5

# CPU: 异常阈值(%), 采样频率(Hz)
cpu_threshold = 90
cpu_profile_hz = 99

# I/O: 采样间隔(秒)
io_interval = 3

# 内存: 采样间隔(秒), 可用内存低阈值(%), 主缺页(/s),
#       缓存未命中(/s), swap换入(/s), 直接回收延迟(ms),
#       内存分配重试(/s), 缺页(/s)
mem_interval = 3
mem_avail_pct = 20
mem_majfault = 200
mem_refault = 1000
mem_swapin = 500
mem_direct_stall_ms = 1
mem_retry_ps = 50
mem_fault_ps = 5000

# 锁: futex 警告阈值(us), futex 严重阈值(us), 阻塞告警阈值(ms)
lock_futex_warn_us = 10000
lock_futex_crit_us = 50000
lock_blocked_warn_ms = 100

# 系统调用: 频率告警(/s), 延迟告警(us), 错误率告警(0-1)
hot_freq_per_sec = 10000
hot_lat_us = 10000
hot_err_rate = 0.1
