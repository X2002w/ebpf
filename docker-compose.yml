services:
  openkylin:
    build:
      context: .
      dockerfile: Dockerfile
    image: eebpf-dev:latest
    container_name: openkylin-dev
    network_mode: host
    # 共享宿主 PID 命名空间，/proc 可见宿主进程且 /proc/sys 可写(schedstats 开关)
    pid: host
    privileged: true
    cap_add:
      - BPF
      - PERFMON
      - SYS_RESOURCE
    tty: true
    stdin_open: true
    volumes:
      - .:/workspace
      - /sys/kernel/btf:/sys/kernel/btf:ro
      - /sys/kernel/tracing:/sys/kernel/tracing:rw
      - /boot:/boot:ro
      - /sys:/sys:ro
    restart: unless-stopped
